<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMTEC - Performance Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --hmtec-purple: #6c5ce7;
            --hmtec-lime: #bbff00;
            --hmtec-dark: #0d0d0f;
        }

        body {
            background-color: var(--hmtec-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(108, 92, 231, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(187, 255, 0, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Efeito de Vidro (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* TEXTURA DO MENU DE CADASTRO */
        .menu-texture {
            /* Imagem de textura sutil (Carbon Fiber/Dark Pattern) */
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            background-color: rgba(15, 15, 18, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .hmtec-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            transition: all 0.3s ease;
        }

        .hmtec-input:focus {
            border-color: var(--hmtec-lime);
            background: rgba(0, 0, 0, 0.5);
            outline: none;
        }

        /* Botões Estilo "Registrar" (Pequenos) */
        .btn-action-minimal {
            background: white;
            color: black;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.1em;
            padding: 4px 10px;
            border-radius: 6px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-action-minimal:hover {
            background: var(--hmtec-lime);
            transform: translateY(-1px);
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(187, 255, 0, 0.2);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="font-sans text-gray-300">

    <header class="p-12 mb-6">
        <div class="container mx-auto text-center">
            <h1 class="text-5xl font-black tracking-[0.25em] text-white glow-text uppercase">HMTEC</h1>
            <p class="mt-4 text-[10px] uppercase tracking-[0.6em] text-gray-600 font-light">Advanced Hardware Management</p>
        </div>
    </header>

    <main class="container mx-auto px-6 pb-32">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-10">
            
            <div class="lg:col-span-1 menu-texture p-8 rounded-[2rem] shadow-2xl h-fit">
                <h2 class="text-[10px] font-black mb-10 text-white uppercase tracking-[0.3em] flex items-center">
                    <span class="w-1.5 h-1.5 bg-[var(--hmtec-lime)] rounded-full mr-3"></span>
                    Novo Registro
                </h2>
                <form id="add-pc-form" class="space-y-6">
                    <div>
                        <label class="text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-1 block">Cliente</label>
                        <input type="text" name="clientName" required class="w-full hmtec-input p-3 rounded-xl text-xs">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-1 block">WhatsApp</label>
                        <input type="tel" name="clientPhone" placeholder="79..." class="w-full hmtec-input p-3 rounded-xl text-xs">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-1 block">Configuração</label>
                        <input type="text" name="pcModel" placeholder="RTX / i9 / DDR5" class="w-full hmtec-input p-3 rounded-xl text-xs">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-1 block">E-mail</label>
                        <input type="email" name="clientEmail" placeholder="lab@hmtec..." class="w-full hmtec-input p-3 rounded-xl text-xs">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-1 block">Entrada</label>
                        <input type="datetime-local" name="entryDate" required class="w-full hmtec-input p-3 rounded-xl text-xs">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-1 block">Acordo SLA</label>
                        <select name="sla" class="w-full hmtec-input p-3 rounded-xl text-xs bg-black">
                            <option value="24">24 HORAS</option>
                            <option value="48">48 HORAS</option>
                            <option value="72">72 HORAS</option>
                            <option value="0">NÃO-ACORDADO</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="w-full bg-white text-black hover:bg-[var(--hmtec-lime)] p-4 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] transition-all duration-500 mt-4">
                        Registrar na Bancada
                    </button>
                </form>
            </div>

            <div class="lg:col-span-3 glass-card p-10 rounded-[2rem]">
                <div class="flex items-center justify-between mb-12">
                    <h2 class="text-[10px] font-bold text-white uppercase tracking-[0.3em]">Monitoramento de Status</h2>
                    <div class="text-[var(--hmtec-lime)] text-[9px] font-mono border border-[var(--hmtec-lime)]/30 px-4 py-1 rounded-full uppercase tracking-widest">
                        Core Online
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-gray-600 text-[9px] uppercase tracking-[0.3em] border-b border-white/5">
                            <tr>
                                <th class="pb-6 px-4">Técnico/ID</th>
                                <th class="pb-6 px-4">Equipamento</th>
                                <th class="pb-6 px-4">Data/Hora</th>
                                <th class="pb-6 px-4">Status</th>
                                <th class="pb-6 px-4 text-center">Progresso</th>
                                <th class="pb-6 px-4 text-center">Conectar</th>
                            </tr>
                        </thead>
                        <tbody id="pc-table-body" class="text-xs">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzO4PI9HE8XAgq-7qeJlA26W2S8tkvlurUzBoIzxbVxqCvIBzwpEgV9GvPRPlLMOjQTYQ/exec';
    const form = document.getElementById('add-pc-form');
    const tableBody = document.getElementById('pc-table-body');

    async function loadMaintenances() {
        tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-20 text-[9px] tracking-[0.5em] text-gray-700">FETCHING DATA...</td></tr>';
        try {
            const response = await fetch(SCRIPT_URL + '?t=' + new Date().getTime());
            const data = await response.json();
            tableBody.innerHTML = ''; 
            
            data.forEach(item => {
                let dataFormatada = "N/A";
                if (item.entryDate) {
                    const partes = item.entryDate.split('T');
                    const d = partes[0].split('-');
                    const h = partes[1] ? partes[1].substring(0, 5) : ""; 
                    dataFormatada = `<span class="text-gray-200">${d[2]}/${d[1]}</span> <span class="text-[9px] text-gray-600 ml-1">${h}</span>`;
                }

                let slaVisual = '--';
                if (item.sla && item.sla !== "0" && item.status !== 'Finalizado') {
                    const slaHours = parseInt(item.sla);
                    const entryTime = new Date(item.entryDate).getTime();
                    const now = new Date().getTime();
                    const p = Math.max(0, Math.min(100, (((now - entryTime) / (1000 * 60 * 60)) / slaHours) * 100));
                    let color = 'bg-white/20';
                    if (p >= 50) color = 'bg-yellow-500/40';
                    if (p >= 100) color = 'bg-red-600/60';
                    slaVisual = `<div class="w-16 mx-auto bg-white/5 h-1 rounded-full overflow-hidden"><div class="${color} h-full" style="width: ${p}%"></div></div>`;
                } else if (item.status === 'Finalizado') {
                    slaVisual = '<span class="text-[9px] text-[var(--hmtec-lime)] font-bold">READY</span>';
                }

                const rowId = `gaveta-${item.rowNumber}`;
                const row = document.createElement('tr');
                row.className = "border-b border-white/5 hover:bg-white/[0.01] transition-all cursor-pointer";
                row.onclick = (e) => { if(!['SELECT','BUTTON'].includes(e.target.tagName)) toggleGaveta(rowId); };

                const statusColors = {'Aguardando Autorização':'text-yellow-500','Aguardando Peças':'text-orange-500','Aguardando Testes Finais':'text-blue-500','Finalizado':'text-[var(--hmtec-lime)]'};

                row.innerHTML = `
                    <td class="py-6 px-4 font-bold text-white uppercase tracking-tighter text-[11px] italic"># ${item.clientName}</td>
                    <td class="py-6 px-4 text-gray-500 text-[10px] uppercase font-light">${item.pcModel}</td>
                    <td class="py-6 px-4 font-mono text-[10px]">${dataFormatada}</td>
                    <td class="py-6 px-4">
                        <select onchange="atualizarStatus(${item.rowNumber}, this.value, this, '${encodeURIComponent(JSON.stringify(item))}')" 
                                class="bg-transparent border-none ${statusColors[item.status] || 'text-gray-500'} text-[9px] font-black uppercase tracking-widest cursor-pointer focus:outline-none">
                            ${Object.keys(statusColors).map(s => `<option value="${s}" ${item.status === s ? 'selected' : ''} class="bg-[#0d0d0f] text-white">${s}</option>`).join('')}
                        </select>
                    </td>
                    <td class="py-6 px-4 text-center">${slaVisual}</td>
                    <td class="py-6 px-4">
                        <div class="flex gap-2 justify-center">
                            <button onclick="abrirWhatsApp('${item.clientPhone}', '${item.clientName}')" class="btn-action-minimal">WPP</button>
                            <button onclick="dispararEmail('${item.clientEmail}', '${item.clientName}', '${item.pcModel}')" class="btn-action-minimal">MAIL</button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);

                const g = document.createElement('tr');
                g.id = rowId; g.className = "hidden bg-white/[0.005]";
                g.innerHTML = `<td colspan="6" class="p-10 border-b border-white/5">
                    <div class="grid grid-cols-2 gap-16">
                        <div>
                            <span class="text-[9px] font-black text-gray-600 tracking-[0.4em] uppercase mb-8 block">Diagnostic Checklist</span>
                            <div class="space-y-4">
                                ${['ferrugem', 'maresia', 'naoliga', 'poeira', 'danos'].map(c => `
                                    <label class="flex items-center space-x-3 cursor-pointer">
                                        <input type="checkbox" onchange="salvarChecklist(${item.rowNumber}, '${rowId}')" ${checks[c] ? 'checked' : ''} class="w-3 h-3 accent-[var(--hmtec-lime)] opacity-30">
                                        <span class="text-[10px] text-gray-500 uppercase tracking-widest">${c.replace('poeira','Sujeira').replace('danos','Danos Físicos')}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                        <div>
                            <span class="text-[9px] font-black text-[var(--hmtec-lime)] tracking-[0.4em] uppercase mb-8 block">Lab Report</span>
                            <div id="historico-texto-${item.rowNumber}" class="text-[11px] text-gray-500 bg-black/40 p-6 rounded-2xl mb-4 font-mono h-32 overflow-y-auto leading-relaxed border border-white/5 italic">${item.serviceDetails}</div>
                            <div class="flex gap-2">
                                <textarea id="novo-servico-${item.rowNumber}" class="w-full bg-black/60 border border-white/5 text-white p-4 text-[10px] rounded-2xl focus:border-[var(--hmtec-lime)]/30 focus:outline-none" rows="2" placeholder="ENTRY DATA..."></textarea>
                                <button onclick="adicionarServico(${item.rowNumber})" class="bg-white text-black font-black text-[9px] px-6 rounded-2xl hover:bg-[var(--hmtec-lime)] transition-all uppercase">Add</button>
                            </div>
                        </div>
                    </div>
                </td>`;
                tableBody.appendChild(g);
            });
        } catch (e) { console.error(e); }
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button'); btn.innerText = 'SYNC...'; btn.disabled = true;
        const d = {}; new FormData(form).forEach((v, k) => d[k] = v);
        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) }).then(() => {
            form.reset(); btn.innerText = 'REGISTRAR'; btn.disabled = false;
            setTimeout(() => loadMaintenances(), 1000);
        });
    });

    function abrirWhatsApp(t, n) { 
        if(!t) return alert("NO NUMBER");
        const nl = t.replace(/\D/g, ''); const nf = nl.startsWith('55') ? nl : '55'+nl;
        window.open(`https://wa.me/${nf}?text=${encodeURIComponent('HMTEC PERFORMANCE: Olá '+n)}`, '_blank');
    }

    async function dispararEmail(e, n, m) { 
        await fetch(`${SCRIPT_URL}?action=sendEmail&email=${encodeURIComponent(e)}&name=${encodeURIComponent(n)}&model=${encodeURIComponent(m)}`, {mode:'no-cors'});
        alert("MAIL SENT");
    }

    function toggleGaveta(id) { document.getElementById(id).classList.toggle('hidden'); }

    async function salvarChecklist(row, id) {
        const c = document.getElementById(id).querySelectorAll('input[type="checkbox"]');
        const d = { ferrugem: c[0].checked, maresia: c[1].checked, naoliga: c[2].checked, poeira: c[3].checked, danos: c[4].checked };
        await fetch(`${SCRIPT_URL}?action=updateChecklist&row=${row}&checklist=${encodeURIComponent(JSON.stringify(d))}`, {mode:'no-cors'});
    }

    async function adicionarServico(row) {
        const f = document.getElementById(`novo-servico-${row}`); const h = document.getElementById(`historico-texto-${row}`);
        if(!f.value.trim()) return;
        const res = await fetch(`${SCRIPT_URL}?action=updateService&row=${row}&texto=${encodeURIComponent(f.value.trim())}`);
        const d = await res.json(); h.innerText = d.textoFinal; f.value = ""; h.scrollTop = h.scrollHeight;
    }

    async function atualizarStatus(row, s, el, i) {
        await fetch(`${SCRIPT_URL}?action=updateStatus&row=${row}&status=${encodeURIComponent(s)}`, {mode:'no-cors'});
        loadMaintenances();
        if(s === 'Finalizado') {
            const item = JSON.parse(decodeURIComponent(i));
            const j = window.open('', '', 'width=800,height=600');
            j.document.write(`<html><body style="font-family:sans-serif;padding:50px;"><h1>HMTEC - REPORT</h1><p>Client: ${item.clientName}</p><pre>${document.getElementById(`historico-texto-${row}`).innerText}</pre></body></html>`);
            j.document.close(); setTimeout(() => j.print(), 500);
        }
    }

    loadMaintenances();
</script>
</body>
</html>
