<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

HMTEC - Performance Lab

</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

:root{

--hmtec-purple:#6c5ce7;
--hmtec-lime:#bbff00;
--hmtec-dark:#0d0d0f;

}

body{

background-color:
var(--hmtec-dark);

background-image:

radial-gradient(
at 0% 0%,
rgba(108,92,231,.12),
transparent 50%
),

radial-gradient(
at 100% 100%,
rgba(187,255,0,.05),
transparent 50%
);

background-attachment:
fixed;

min-height:100vh;

}

.glass-card{

background:
rgba(
255,
255,
255,
0.02
);

backdrop-filter:
blur(12px);

border:
1px solid
rgba(
255,
255,
255,
0.05
);

}

.menu-texture{

background-image:

url(
'https://www.transparenttextures.com/patterns/carbon-fibre.png'
);

background-color:

rgba(
15,
15,
18,
0.95
);

}

.hmtec-input{

background:
rgba(
0,
0,
0,
0.3
);

border:
1px solid
rgba(
255,
255,
255,
0.15
);

color:white;

}

.btn-action-minimal{

background:white;

color:black;

font-size:9px;

font-weight:800;

padding:6px 12px;

border-radius:6px;

}

.btn-action-minimal:hover{

background:
var(
--hmtec-lime
);

}

.show-gaveta{

display:table-row!important;

}

</style>

</head>

<body class="font-sans text-gray-300">

<header class="p-16">

<div class="container mx-auto text-center">

<h1 class="
text-8xl
font-black
tracking-[0.3em]
text-white
uppercase
">

HMTEC

</h1>

<p class="
mt-6
uppercase
tracking-[0.7em]
text-gray-500
">

Gerência de Assistência Técnica

</p>

</div>

</header>
<main class="
container
mx-auto
px-6
pb-40
">

<div class="
grid
grid-cols-1
lg:grid-cols-4
gap-10
">

<div class="
lg:col-span-1
menu-texture
p-8
rounded-[2rem]
">

<h2 class="
text-white
uppercase
mb-10
">

Novo Registro

</h2>

<form id="add-pc-form"
class="space-y-6">

<input
name="clientName"
required
placeholder="Cliente"
class="
w-full
hmtec-input
p-3
rounded-xl
">

<input
name="clientPhone"
placeholder="WhatsApp"
class="
w-full
hmtec-input
p-3
rounded-xl
">

<input
name="pcModel"
placeholder="Equipamento"
class="
w-full
hmtec-input
p-3
rounded-xl
">

<input
name="clientEmail"
placeholder="Email"
class="
w-full
hmtec-input
p-3
rounded-xl
">

<input
type="datetime-local"
name="entryDate"

class="
w-full
hmtec-input
p-3
rounded-xl
">

<select
name="sla"

class="
w-full
hmtec-input
p-3
rounded-xl
">

<option value="24">

24 HORAS

</option>

<option value="48">

48 HORAS

</option>

<option value="72">

72 HORAS

</option>

<option value="0">

NÃO ACORDADO

</option>

</select>

<button
type="submit"

class="
w-full
bg-white
text-black
p-4
rounded-xl
font-black
">

REGISTRAR

</button>

</form>

</div>

<div class="
lg:col-span-3
glass-card
p-10
rounded-[2rem]
">

<div class="
flex
justify-between
mb-8
">

<h2 class="
uppercase
text-white
">

Monitoramento

</h2>

<div
id="api-status"

class="
text-[var(--hmtec-lime)]
border
px-4
py-1
rounded-full
uppercase
">

SYNC

</div>

</div>

<input

id="pesquisa"

placeholder="
Buscar cliente...
"

class="
hmtec-input
p-3
rounded-xl
w-full
mb-8
"

>

<div class="overflow-x-auto">

<table class="w-full">

<thead>

<tr>

<th>

Cliente

</th>

<th>

Equipamento

</th>

<th>

Entrada

</th>

<th>

Status

</th>

<th>

SLA

</th>

<th>

Ações

</th>

</tr>

</thead>

<tbody id="pc-table-body">

</tbody>

</table>

</div>

</div>

</div>

</main>
<script>

const SCRIPT_URL=
'https://script.google.com/macros/s/AKfycbzO4PI9HE8XAgq-7qeJlA26W2S8tkvlurUzBoIzxbVxqCvIBzwpEgV9GvPRPlLMOjQTYQ/exec';

const tableBody=
document.getElementById(
'pc-table-body'
);

let gavetasAbertas=
new Set();

function formatarReport(t){

if(!t)return'';

return t.replace(

/\[IMG:(.*?)\]/g,

'<img src="$1" class="w-48 rounded-xl my-4">'

);

}

async function pingApi(){

try{

await fetch(
`${SCRIPT_URL}?action=list`
);

document
.getElementById(
'api-status'
)

innerText=
'ONLINE';

}catch{

document
.getElementById(
'api-status'
)

innerText=
'OFFLINE';

}

}

async function loadMaintenances(){

const r=
await fetch(
`${SCRIPT_URL}?action=list&t=${Date.now()}`
);

const data=
await r.json();

tableBody.innerHTML='';

data.forEach(item=>{

const tr=
document.createElement(
'tr'
);

tr.innerHTML=`

<td>

${item.clientName}

</td>

<td>

${item.pcModel}

</td>

<td>

${item.entryDate}

</td>

<td>

${item.status}

</td>

<td>

${item.sla}

</td>

<td>

<button

onclick="
abrirWhatsApp(
'${item.clientPhone}',
'${item.clientName}'
)
"

class="
btn-action-minimal
"

>

WPP

</button>

</td>

`;

tableBody.appendChild(
tr
);

});

}

function abrirWhatsApp(
t,
n
){

if(!t)return;

window.open(

`https://wa.me/55${t.replace(/\D/g,'')}

?text=${encodeURIComponent(
'HMTEC: Olá '+n
)}`,

'_blank'

);

}

document
.getElementById(
'add-pc-form'
)

.addEventListener(
'submit',

async function(e){

e.preventDefault();

let dados=
Object.fromEntries(
new FormData(
this
)
);

dados.action=
'newRecord';

await fetch(

SCRIPT_URL,

{

method:'POST',

headers:{

'Content-Type':
'application/json'

},

body:
JSON.stringify(
dados
)

}

);

this.reset();

loadMaintenances();

}

);

document
.getElementById(
'pesquisa'
)

.addEventListener(
'input',
e=>{

const termo=
e.target.value
.toLowerCase();

document
.querySelectorAll(
'#pc-table-body tr'
)

.forEach(l=>{

l.style.display=

l.innerText
.toLowerCase()
.includes(
termo
)

?

''

:

'none';

});

});

pingApi();

loadMaintenances();

setInterval(
pingApi,
30000
);

</script>

</body>

</html>
