<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>

HMTEC - Performance Lab

</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

:root{

--hmtec-purple:#6c5ce7;
--hmtec-lime:#bbff00;
--hmtec-dark:#0d0d0f;

}

body{

background-color:
var(--hmtec-dark);

background-image:

radial-gradient(
at 0% 0%,
rgba(108,92,231,.12),
transparent 50%
),

radial-gradient(
at 100% 100%,
rgba(187,255,0,.05),
transparent 50%
);

background-attachment:fixed;

min-height:100vh;

}

.glass-card{

background:
rgba(
255,
255,
255,
0.02
);

backdrop-filter:
blur(12px);

border:
1px solid
rgba(
255,
255,
255,
0.05
);

}

.menu-texture{

background-image:
url(
'https://www.transparenttextures.com/patterns/carbon-fibre.png'
);

background-color:
rgba(
15,
15,
18,
0.95
);

border:
1px solid
rgba(
255,
255,
255,
0.08
);

}

.hmtec-input{

background:
rgba(
0,
0,
0,
0.3
);

border:
1px solid
rgba(
255,
255,
255,
0.15
);

color:white;

}

.hmtec-input:focus{

border-color:
var(
--hmtec-lime
);

outline:none;

}

.btn-action-minimal{

background:white;

color:black;

font-size:9px;

font-weight:800;

padding:6px 12px;

border-radius:6px;

text-transform:uppercase;

}

.btn-action-minimal:hover{

background:
var(
--hmtec-lime
);

}

.show-gaveta{

display:table-row!important;

}

.text-label{

color:#a1a1aa;

font-weight:600;

}

.text-checklist{

color:#e4e4e7;

}

</style>

</head>

<body class="font-sans text-gray-300">

  <header class="p-16 mb-6">

<div class="container mx-auto text-center">

<h1 class="
text-8xl
font-black
tracking-[0.3em]
text-white
uppercase
">

HMTEC

</h1>

<p class="
mt-6
uppercase
tracking-[0.7em]
text-gray-500
">

Gerência Assistência Técnica

</p>

</div>

</header>

<main class="
container
mx-auto
px-6
pb-40
">

<div class="
grid
grid-cols-1
lg:grid-cols-4
gap-10
">

<div class="
lg:col-span-1
menu-texture
p-8
rounded-[2rem]
">

<form id="add-pc-form"
class="space-y-6">

<input
name="clientName"
required
placeholder="Cliente"
class="
w-full
hmtec-input
p-3
rounded-xl
">

<input
name="clientPhone"
placeholder="WhatsApp"
class="
w-full
hmtec-input
p-3
rounded-xl
">

<input
name="pcModel"
placeholder="GPU / CPU"
class="
w-full
hmtec-input
p-3
rounded-xl
">

<input
name="clientEmail"
placeholder="Email"
class="
w-full
hmtec-input
p-3
rounded-xl
">

<input
type="datetime-local"
name="entryDate"

class="
w-full
hmtec-input
p-3
rounded-xl
">

<select
name="sla"

class="
w-full
hmtec-input
p-3
rounded-xl
">

<option value="24">24 HORAS</option>
<option value="48">48 HORAS</option>
<option value="72">72 HORAS</option>
<option value="0">NÃO ACORDADO</option>

</select>

<button
type="submit"

class="
w-full
bg-white
text-black
p-4
rounded-xl
font-black
">

REGISTRAR

</button>

</form>

</div>

  <div class="
lg:col-span-3
glass-card
p-10
rounded-[2rem]
">

<div class="
flex
justify-between
mb-8
">

<h2>

Monitoramento

</h2>

<div
id="api-status"

class="
text-[var(--hmtec-lime)]
border
border-[var(--hmtec-lime)]/30
px-4
py-1
rounded-full
uppercase
">

SYNC

</div>

</div>

<input

id="pesquisa"

placeholder="
Buscar cliente...
"

class="
w-full
hmtec-input
p-3
rounded-xl
mb-6
"

>

<div class="overflow-x-auto">

<table class="w-full">

<thead>

<tr>

<th>Cliente</th>
<th>Equipamento</th>
<th>Entrada</th>
<th>Status</th>
<th>SLA</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="pc-table-body">

</tbody>

</table>

</div>

</div>

</div>

</main>

  <script>

const SCRIPT_URL=
'https://script.google.com/macros/s/AKfycbzO4PI9HE8XAgq-7qeJlA26W2S8tkvlurUzBoIzxbVxqCvIBzwpEgV9GvPRPlLMOjQTYQ/exec';

const tableBody=
document.getElementById(
'pc-table-body'
);

let gavetasAbertas=
new Set();

function formatarReport(texto){

if(!texto)return'';

let html=
texto;

html=
html.replace(

/\[IMG:(.*?)\]/g,

'<img src="$1" class="w-full max-w-sm rounded-xl my-4 border border-white/10">'

);

return html;

}

    async function adicionarServico(row){

const campo=
document.getElementById(
`novo-servico-${row}`
);

if(!campo.value.trim())
return;

const r=
await fetch(

`${SCRIPT_URL}?action=updateService&row=${row}&texto=${encodeURIComponent(campo.value)}`

);

const d=
await r.json();

document.getElementById(
`historico-texto-${row}`
)

.innerHTML=
formatarReport(
d.textoFinal
);

campo.value='';

}

async function adicionarFoto(row){

const input=
document.getElementById(
`nova-foto-${row}`
);

const file=
input.files[0];

if(!file)return;

const reader=
new FileReader();

reader.onload=
async e=>{

const base64=
e.target.result
.split(',')[1];

await fetch(
SCRIPT_URL,
{
method:'POST',
headers:{
'Content-Type':
'application/json'
},
body:JSON.stringify({
action:'uploadPhoto',
row,
base64,
mimeType:file.type,
filename:file.name
})
}
);

loadMaintenances();

};

reader.readAsDataURL(
file
);

}

    async function loadMaintenances(){

const r=
await fetch(
`${SCRIPT_URL}?action=list&t=${Date.now()}`
);

const data=
await r.json();

console.log(data);

data.forEach(item=>{

let dataFormatada="N/A";

if(item.entryDate){

const partes=
item.entryDate.split('T');

const d=
partes[0].split('-');

const h=
partes[1]
?
partes[1].substring(
0,
5
)
:
"";

dataFormatada=
`
<span class="
text-gray-100
font-medium
">

${d[2]}/${d[1]}

</span>

<span class="
text-[9px]
text-gray-500
ml-1
">

${h}

</span>
`;

}

let slaVisual='--';

if(

item.sla &&

item.sla!=="0" &&

item.status!=="Finalizado"

){

const slaHours=
parseInt(
item.sla
);

const entrada=
new Date(
item.entryDate
).getTime();

const agora=
new Date().getTime();

const p=
Math.max(
0,
Math.min(
100,
(
(
(agora-entrada)

/

(
1000*60*60
)

)

/

slaHours

)*100
)
);

let cor=
'bg-white/40';

if(p>=50)
cor='bg-yellow-500/60';

if(p>=100)
cor='bg-red-600/80';

slaVisual=
`

<div class="
w-16
mx-auto
bg-white/5
h-1
rounded-full
overflow-hidden
">

<div

class="
${cor}
h-full
"

style="
width:${p}%
"

>

</div>

</div>

`;

}

else if(
item.status==="Finalizado"
){

slaVisual=
`

<span class="
text-[var(--hmtec-lime)]
font-bold
text-[9px]
">

PRONTO

</span>

`;

}

let checks={};

try{

checks=
JSON.parse(
item.checklist
);

}catch{

checks={};

}

const rowId=
`gaveta-${item.rowNumber}`;

const row=
document.createElement(
'tr'
);

row.className=
`
border-b
border-white/5
hover:bg-white/[0.01]
cursor-pointer
`;

row.onclick=
e=>{

if(

![
'BUTTON',
'SELECT',
'INPUT',
'TEXTAREA'
]

.includes(
e.target.tagName
)

)

toggleGaveta(
rowId
);

};

const statusColors={

'Aguardando Autorização':
'text-yellow-500',

'Aguardando Peças':
'text-orange-500',

'Aguardando Testes Finais':
'text-blue-500',

'Finalizado':
'text-[var(--hmtec-lime)]'

};

row.innerHTML=
`

<td class="
py-6
px-4
font-bold
text-white
uppercase
text-[11px]
">

#

${item.clientName}

</td>

<td class="
py-6
px-4
text-gray-300
text-[10px]
uppercase
">

${item.pcModel}

</td>

<td class="
py-6
px-4
font-mono
text-[10px]
">

${dataFormatada}

</td>

<td class="
py-6
px-4
">

<select

onchange="
atualizarStatus(
${item.rowNumber},
this.value,
'${encodeURIComponent(
JSON.stringify(
item
)
)}'
)
"

class="
bg-transparent
border-none

${statusColors[
item.status
]}

text-[9px]
font-black
uppercase
"

>

${Object.keys(
statusColors
)

.map(
s=>

`

<option

value="${s}"

${item.status===s?'selected':''}

class="
bg-black
text-white
"

>

${s}

</option>

`

)

.join('')

}

</select>

</td>

<td class="
py-6
px-4
text-center
">

${slaVisual}

</td>

<td class="
py-6
px-4
text-center
">

<div class="
flex
flex-col
gap-2
items-center
">

<button

onclick="
event.stopPropagation();
abrirWhatsApp(
'${item.clientPhone}',
'${item.clientName}'
)
"

class="
btn-action-minimal
w-20
"

>

WPP

</button>

<button

onclick="
event.stopPropagation();
dispararEmail(
'${item.clientEmail}',
'${item.clientName}',
'${item.pcModel}'
)
"

class="
btn-action-minimal
w-20
"

>

MAIL

</button>

</div>

</td>

`;

tableBody.appendChild(
row
);

const g=
document.createElement(
'tr'
);

g.id=rowId;

g.className='hidden';

g.innerHTML=
`

<td colspan="6"
class="
p-10
border-b
border-white/10
">

<div class="
grid
grid-cols-1
md:grid-cols-2
gap-16
">

<div>

<span class="
uppercase
tracking-[0.4em]
text-gray-400
text-[9px]
mb-8
block
">

Diagnostic Checklist

</span>

<div class="
space-y-4
">

${Object.entries({

ferrugem:'Ferrugem',

maresia:'Maresia',

naoliga:'Não Liga',

poeira:'Sujeira',

danos:'Danos Físicos'

})

.map(

([k,v])=>

`

<label class="
flex
items-center
gap-3
">

<input

type="checkbox"

${checks[k]?'checked':''}

onchange="
salvarChecklist(
${item.rowNumber},
'${rowId}'
)
"

>

<span>

${v}

</span>

</label>

`

)

.join('')

}

</div>

</div>

<div>

<span class="
uppercase
tracking-[0.4em]
text-[var(--hmtec-lime)]
text-[9px]
mb-8
block
">

Lab Report

</span>

<div

id="
historico-texto-${item.rowNumber}
"

class="
bg-black/40
p-6
rounded-2xl
mb-4
h-32
overflow-y-auto
whitespace-pre-wrap
"

>

${formatarReport(
item.serviceDetails
)}

</div>

<textarea

id="
novo-servico-${item.rowNumber}
"

rows="2"

class="
w-full
hmtec-input
p-4
rounded-2xl
"

></textarea>

</div>

</div>

</td>

`;

tableBody.appendChild(
g
);

});

}

async function pingApi(){

try{

await fetch(
`${SCRIPT_URL}?action=list`
);

document
.getElementById(
'api-status'
)

innerText=
'ONLINE';

}

catch{

document
.getElementById(
'api-status'
)

innerText=
'OFFLINE';

}

}

loadMaintenances();

pingApi();

setInterval(
pingApi,
30000
);

</script>

</body>

</html>
