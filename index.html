<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMTEC - Gestão Industrial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --hmtec-purple: #6c5ce7;
            --hmtec-lime: #bbff00;
            --hmtec-dark: #0d0d0f;
        }

        /* Fundo Minimalista Aesthetic (Mesh Gradient) */
        body {
            background-color: var(--hmtec-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(108, 92, 231, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(187, 255, 0, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
            min-height: 100-screen;
        }

        /* Cartões com efeito de vidro fosco */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Inputs minimalistas */
        .hmtec-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s ease;
        }

        .hmtec-input:focus {
            border-color: var(--hmtec-lime);
            background: rgba(0, 0, 0, 0.4);
            outline: none;
        }

        /* Cabeçalho Minimal */
        .header-minimal {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(187, 255, 0, 0.3);
        }

        /* Scrollbar customizada para manter o estilo */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--hmtec-purple); }
    </style>
</head>
<body class="font-sans text-gray-300">

    <header class="header-minimal p-10 mb-10">
        <div class="container mx-auto text-center">
            <h1 class="text-5xl font-black tracking-[0.2em] text-white glow-text">HMTEC</h1>
            <p class="mt-3 text-xs uppercase tracking-[0.5em] text-gray-500 font-light">Performance & Maintenance Lab</p>
        </div>
    </header>

    <main class="container mx-auto px-6 pb-24">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-10">
            
            <div class="lg:col-span-1 glass-card p-8 rounded-3xl h-fit">
                <h2 class="text-sm font-bold mb-8 text-white uppercase tracking-widest flex items-center">
                    <span class="w-1.5 h-1.5 bg-[var(--hmtec-lime)] rounded-full mr-3 animate-pulse"></span>
                    Check-in
                </h2>
                <form id="add-pc-form" class="space-y-6">
                    <div>
                        <label class="text-[10px] uppercase tracking-wid-est text-gray-500 ml-1">Cliente</label>
                        <input type="text" name="clientName" required class="w-full hmtec-input mt-1 p-3 rounded-xl text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-gray-500 ml-1">WhatsApp</label>
                        <input type="tel" name="clientPhone" placeholder="79 9..." class="w-full hmtec-input mt-1 p-3 rounded-xl text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-gray-500 ml-1">Setup</label>
                        <input type="text" name="pcModel" placeholder="GPU / CPU / RAM" class="w-full hmtec-input mt-1 p-3 rounded-xl text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-gray-500 ml-1">E-mail</label>
                        <input type="email" name="clientEmail" placeholder="contato@..." class="w-full hmtec-input mt-1 p-3 rounded-xl text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-gray-500 ml-1">Entrada</label>
                        <input type="datetime-local" name="entryDate" required class="w-full hmtec-input mt-1 p-3 rounded-xl text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-gray-500 ml-1">SLA</label>
                        <select name="sla" class="w-full hmtec-input mt-1 p-3 rounded-xl text-sm bg-[#121212]">
                            <option value="24">24 HORAS</option>
                            <option value="48">48 HORAS</option>
                            <option value="72">72 HORAS</option>
                            <option value="0">NÃO-ACORDADO</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="w-full bg-white text-black hover:bg-[var(--hmtec-lime)] p-4 rounded-xl font-bold text-xs uppercase tracking-widest transition-all duration-300">
                        Registrar
                    </button>
                </form>
            </div>

            <div class="lg:col-span-3 glass-card p-8 rounded-3xl">
                <div class="flex items-center justify-between mb-10">
                    <h2 class="text-sm font-bold text-white uppercase tracking-widest">Atendimentos Ativos</h2>
                    <div class="text-[var(--hmtec-lime)] text-[10px] font-mono border border-[var(--hmtec-lime)]/20 px-4 py-1 rounded-full">
                        SYSTEM ONLINE
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-gray-600 text-[10px] uppercase tracking-[0.2em] border-b border-white/5">
                            <tr>
                                <th class="pb-4 px-4 font-normal">Cliente</th>
                                <th class="pb-4 px-4 font-normal">Equipamento</th>
                                <th class="pb-4 px-4 font-normal">Entrada</th>
                                <th class="pb-4 px-4 font-normal">Status</th>
                                <th class="pb-4 px-4 font-normal text-center">SLA</th>
                                <th class="pb-4 px-4 font-normal text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="pc-table-body" class="text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="border-t border-white/5 text-gray-600 p-8 fixed bottom-0 left-0 w-full bg-black/20 backdrop-blur-md">
        <div class="container mx-auto text-center text-[10px] uppercase tracking-widest">
            Hmtec Maintenance Lab &copy; 2026 // Aracaju - SE
        </div>
    </footer>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzO4PI9HE8XAgq-7qeJlA26W2S8tkvlurUzBoIzxbVxqCvIBzwpEgV9GvPRPlLMOjQTYQ/exec';
    const form = document.getElementById('add-pc-form');
    const tableBody = document.getElementById('pc-table-body');

    async function loadMaintenances() {
        tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-xs tracking-widest text-gray-600">SINCRONIZANDO...</td></tr>';
        
        try {
            const response = await fetch(SCRIPT_URL + '?t=' + new Date().getTime());
            const data = await response.json();
            tableBody.innerHTML = ''; 
            
            if (data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-gray-600">Bancada disponível.</td></tr>';
                return;
            }

            data.forEach(item => {
                let dataFormatada = "N/A";
                if (item.entryDate) {
                    const partes = item.entryDate.split('T');
                    const dataApenas = partes[0].split('-');
                    const horaApenas = partes[1] ? partes[1].substring(0, 5) : ""; 
                    dataFormatada = `<span class="text-gray-300">${dataApenas[2]}/${dataApenas[1]}</span><br><span class="text-[10px] text-gray-600">${horaApenas}</span>`;
                }

                // Cálculo do Timer SLA
                let slaVisual = '<span class="text-[10px] text-gray-700">--</span>';
                if (item.sla && item.sla !== "0" && item.status !== 'Finalizado') {
                    const slaHours = parseInt(item.sla);
                    const entryTime = new Date(item.entryDate).getTime();
                    const now = new Date().getTime();
                    const elapsedHours = (now - entryTime) / (1000 * 60 * 60);
                    const percentage = Math.max(0, Math.min(100, (elapsedHours / slaHours) * 100));
                    
                    let barColor = 'bg-white/20';
                    if (percentage >= 50) barColor = 'bg-yellow-500/50';
                    if (percentage >= 100) barColor = 'bg-red-500/50';
                    
                    slaVisual = `
                        <div class="flex flex-col gap-1 w-20 mx-auto">
                            <div class="w-full bg-white/5 rounded-full h-1 overflow-hidden">
                                <div class="${barColor} h-full transition-all duration-1000" style="width: ${percentage.toFixed(0)}%"></div>
                            </div>
                            <span class="text-[8px] font-mono text-gray-600 text-center uppercase tracking-tighter">${percentage.toFixed(0)}%</span>
                        </div>
                    `;
                } else if (item.status === 'Finalizado') {
                    slaVisual = '<span class="text-[10px] text-[var(--hmtec-lime)] font-bold tracking-widest">OK</span>';
                }

                let checks = {};
                try { checks = JSON.parse(item.checklist); } catch(e) {}
                const rowId = `gaveta-${item.rowNumber}`;
                const row = document.createElement('tr');
                row.className = "border-b border-white/5 hover:bg-white/[0.02] transition-all cursor-pointer group";
                
                row.onclick = (e) => {
                    if(['SELECT', 'BUTTON', 'INPUT'].includes(e.target.tagName)) return;
                    toggleGaveta(rowId);
                };

                const opcoesStatus = [
                    { nome: 'Aguardando Autorização', cor: 'text-yellow-500' },
                    { nome: 'Aguardando Peças', cor: 'text-orange-500' },
                    { nome: 'Aguardando Testes Finais', cor: 'text-blue-500' },
                    { nome: 'Finalizado', cor: 'text-[var(--hmtec-lime)]' }
                ];
                let corAtual = opcoesStatus.find(o => o.nome === item.status)?.cor || 'text-gray-500';

                row.innerHTML = `
                    <td class="py-6 px-4 font-bold text-white tracking-tight">
                        <span class="text-[10px] text-gray-700 mr-2 group-hover:text-white transition-colors">/</span> ${item.clientName}
                    </td>
                    <td class="py-6 px-4 text-gray-500 text-xs">${item.pcModel}</td>
                    <td class="py-6 px-4 font-mono text-xs">${dataFormatada}</td>
                    <td class="py-6 px-4">
                        <select onchange="atualizarStatus(${item.rowNumber}, this.value, this, '${encodeURIComponent(JSON.stringify(item))}')" 
                                class="bg-transparent border-none ${corAtual} text-[10px] font-bold uppercase tracking-widest cursor-pointer focus:outline-none w-full">
                            ${opcoesStatus.map(opt => `<option value="${opt.nome}" ${item.status === opt.nome ? 'selected' : ''} class="bg-[#121212] text-white">${opt.nome}</option>`).join('')}
                        </select>
                    </td>
                    <td class="py-6 px-4 text-center">${slaVisual}</td>
                    <td class="py-6 px-4">
                        <div class="flex gap-4 justify-center">
                            <button onclick="abrirWhatsApp('${item.clientPhone}', '${item.clientName}')" class="text-gray-500 hover:text-green-500 transition-colors">
                                <span class="text-[10px] font-bold tracking-widest">WPP</span>
                            </button>
                            <button onclick="dispararEmail('${item.clientEmail}', '${item.clientName}', '${item.pcModel}')" class="text-gray-500 hover:text-blue-500 transition-colors">
                                <span class="text-[10px] font-bold tracking-widest">MAIL</span>
                            </button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);

                // Gaveta Aesthetic
                const gavetaRow = document.createElement('tr');
                gavetaRow.id = rowId;
                gavetaRow.className = "hidden bg-white/[0.01]"; 
                gavetaRow.innerHTML = `
                    <td colspan="6" class="p-10 border-b border-white/5">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                            <div>
                                <span class="text-[10px] font-bold text-gray-600 tracking-[0.3em] uppercase mb-6 block">Checklist Lab</span>
                                <div class="grid grid-cols-1 gap-4">
                                    ${['ferrugem', 'maresia', 'naoliga', 'poeira', 'danos'].map(c => `
                                        <label class="flex items-center space-x-3 cursor-pointer group">
                                            <input type="checkbox" onchange="salvarChecklist(${item.rowNumber}, '${rowId}')" ${checks[c] ? 'checked' : ''} class="w-3 h-3 accent-[var(--hmtec-lime)] opacity-50 group-hover:opacity-100 transition-opacity">
                                            <span class="text-[11px] text-gray-500 uppercase tracking-widest">${c.replace('naoliga','Não Liga').replace('poeira','Sujeira').replace('danos','Danos Físicos')}</span>
                                        </label>
                                    `).join('')}
                                </div>
                            </div>
                            <div>
                                <span class="text-[10px] font-bold text-[var(--hmtec-lime)] tracking-[0.3em] uppercase mb-6 block">Relatório Técnico</span>
                                <div id="historico-texto-${item.rowNumber}" class="text-xs text-gray-400 bg-black/20 p-6 rounded-2xl mb-4 font-mono h-32 overflow-y-auto leading-relaxed border border-white/5">${item.serviceDetails}</div>
                                <div class="flex gap-2">
                                    <textarea id="novo-servico-${item.rowNumber}" class="w-full bg-black/40 border border-white/5 text-white p-4 text-xs rounded-2xl focus:border-white/20 focus:outline-none" rows="2" placeholder="Nova entrada..."></textarea>
                                    <button onclick="adicionarServico(${item.rowNumber})" class="bg-white text-black font-bold text-[10px] px-6 rounded-2xl hover:bg-[var(--hmtec-lime)] transition-all">POST</button>
                                </div>
                            </div>
                        </div>
                    </td>
                `;
                tableBody.appendChild(gavetaRow);
            });

        } catch (error) {
            tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-red-900 text-xs">OFFLINE</td></tr>';
        }
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.innerText = 'PROCESSANDO...';
        btn.disabled = true;
        const formData = new FormData(form);
        const data = {};
        formData.forEach((value, key) => data[key] = value);

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(data)
        })
        .then(() => {
            form.reset();
            btn.innerText = 'REGISTRAR';
            btn.disabled = false;
            setTimeout(() => loadMaintenances(), 1000);
        });
    });

    // Funções Globais Inalteradas (Mesma lógica do anterior)
    function abrirWhatsApp(t, n) {
        if(!t) return alert("Sem número.");
        const nLimpo = t.replace(/\D/g, '');
        const nFinal = nLimpo.startsWith('55') ? nLimpo : '55' + nLimpo;
        window.open(`https://wa.me/${nFinal}?text=${encodeURIComponent('Olá '+n+'! Aqui é da HMTEC.')}`, '_blank');
    }

    async function dispararEmail(e, n, m) {
        if(!e) return alert("Sem e-mail.");
        await fetch(`${SCRIPT_URL}?action=sendEmail&email=${encodeURIComponent(e)}&name=${encodeURIComponent(n)}&model=${encodeURIComponent(m)}`, {mode: 'no-cors'});
        alert("E-mail processado.");
    }

    function toggleGaveta(id) {
        const g = document.getElementById(id);
        g.classList.toggle('hidden');
    }

    async function salvarChecklist(row, id) {
        const checks = document.getElementById(id).querySelectorAll('input[type="checkbox"]');
        const data = { ferrugem: checks[0].checked, maresia: checks[1].checked, naoliga: checks[2].checked, poeira: checks[3].checked, danos: checks[4].checked };
        await fetch(`${SCRIPT_URL}?action=updateChecklist&row=${row}&checklist=${encodeURIComponent(JSON.stringify(data))}`, {mode:'no-cors'});
    }

    async function adicionarServico(row) {
        const field = document.getElementById(`novo-servico-${row}`);
        const history = document.getElementById(`historico-texto-${row}`);
        if(!field.value.trim()) return;
        const res = await fetch(`${SCRIPT_URL}?action=updateService&row=${row}&texto=${encodeURIComponent(field.value.trim())}`);
        const d = await res.json();
        history.innerText = d.textoFinal;
        field.value = "";
        history.scrollTop = history.scrollHeight;
    }

    async function atualizarStatus(row, status, el, itemStr) {
        await fetch(`${SCRIPT_URL}?action=updateStatus&row=${row}&status=${encodeURIComponent(status)}`, {mode:'no-cors'});
        loadMaintenances();
        if(status === 'Finalizado') {
            const item = JSON.parse(decodeURIComponent(itemStr));
            gerarOrdemDeServicoPDF(item, row);
        }
    }

    function gerarOrdemDeServicoPDF(item, row) {
        const hist = document.getElementById(`historico-texto-${row}`).innerText;
        const conteudoHTML = `
            <html><body style="font-family:sans-serif; padding:50px;">
                <h1 style="border-bottom:2px solid #000; padding-bottom:10px;">HMTEC - RELATÓRIO TÉCNICO</h1>
                <p><strong>Cliente:</strong> ${item.clientName} | <strong>Equipamento:</strong> ${item.pcModel}</p>
                <hr>
                <h3>PROCEDIMENTOS:</h3>
                <pre style="white-space:pre-wrap; background:#f4f4f4; padding:20px;">${hist}</pre>
                <p style="margin-top:50px; text-align:center; font-size:12px; color:#999;">Hmtec Gestão Industrial de Bancada © 2026</p>
            </body></html>
        `;
        const j = window.open('', '', 'width=800,height=600');
        j.document.write(conteudoHTML);
        j.document.close();
        setTimeout(() => j.print(), 500);
    }

    loadMaintenances();
</script>
</body>
</html>
